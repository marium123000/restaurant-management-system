services:
  - type: web
    name: restaurant-management-system
    env: docker
    plan: free
    buildCommand: dotnet publish -c Release -o out
    startCommand: dotnet out/OnlineRest.dll
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://0.0.0.0:$PORT
      - key: DATABASE_URL
        fromDatabase:
          name: restaurant-db
          property: connectionString

databases:
  - name: restaurant-db
    plan: free
    databaseName: restaurant
    user: restaurant_user
